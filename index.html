    <script>
        const REPORTS = {
            potential: {
                parent: `#### 一、群体核心定位匹配\n您的家庭与孩子完美匹配「潜力型」群体画像：孩子具备扎实的学术基础与极强的自主自律能力，家庭有充足的教育预算支撑，核心诉求是通过国际教育转轨实现升学层级突破，冲击全球顶级名校。\n#### 二、核心优势\n1. 硬实力达标：高学术水平意味着孩子已具备国际课程核心学习能力，高自律性可完美适配国际体系的自主学习模式，无需额外投入精力纠正学习习惯\n2. 支撑充足：预算充足可覆盖顶级名校申请所需的背景提升、竞赛、科研、留学全流程费用，无需为投入产出比压缩规划空间\n3. 目标契合：转轨诉求与国际教育体系培养逻辑高度匹配，不存在底层目标错位问题\n#### 三、转轨核心规划建议（锦上添花，冲击顶级名校）\n1. 课程顶层设计：优先选择A-Level/IB等全球高认可度课程体系，结合孩子学术优势锁定2-3门优势学科深度钻研，精准匹配目标名校的专业申请要求\n2. 背景提升精准布局：围绕目标名校热门专业，规划1-2段高含金量竞赛/科研/夏校经历，打造差异化申请亮点，区别于普通申请者\n3. 时间节点精细化管控：以高中三年为周期制定分阶段规划，高一完成课程适配与基础夯实，高二完成竞赛与标化考试，高三完成申请与面试，全程锁定顶级名校申请窗口期\n#### 四、落地行动方案\n1. 1个月内：完成目标院校与专业筛选，锁定3-5所梦校+3所稳妥院校，明确各院校申请要求\n2. 3个月内：完成国际课程体系适配，确定优势学科，对接对应竞赛与背景提升资源\n3. 高中全程：每学期做1次学术复盘，调整规划路径，确保始终保持在顶级名校申请赛道上\n#### 五、风险提示\n1. 避免“唯分数论”：顶级名校申请不仅看学术成绩，背景提升与个人特质同样重要，勿过度聚焦标化考试忽略综合素养打造\n2. 避免规划过早固化：孩子的兴趣与学术优势可能发生变化，规划需保留调整空间，适配孩子成长节奏`,
                student: `#### 一、群体核心定位匹配\n你完美匹配「潜力型」群体画像：具备极强的学术能力与自主学习习惯，对未来有清晰目标，家庭愿意为你的升学规划提供充足支持，转轨核心目标是冲击全球顶级名校，实现个人升学目标最大化。\n#### 二、核心优势\n1. 学习能力过硬：高学术水平让你能快速适配国际课程学习节奏，高自律性让你可自主完成学习规划，无需强制监督\n2. 目标感清晰：对名校的明确诉求，让你有足够动力应对国际课程学习压力与申请流程的复杂环节\n3. 家庭支持充足：家庭预算支撑让你无需为学习资源、背景提升费用担忧，可全身心投入学术提升与名校申请\n#### 三、转轨核心成长建议（锦上添花，冲击顶级名校）\n1. 打造个人学术标签：在优势学科上深度钻研，不仅要拿高分，更要形成独立学术见解，通过竞赛、科研打造差异化个人申请亮点\n2. 适配国际学习模式：国际课程更注重课堂参与、小组协作与批判性思维，提前适配这种模式，主动参与课堂讨论，积累团队协作经历，匹配名校招生偏好\n3. 做好长期节奏管控：顶级名校申请是长期战，需制定分阶段学习计划，平衡课程学习、标化考试、背景提升的时间，避免前期用力过猛后期乏力，或前期松懈后期赶进度\n#### 四、落地行动方案\n1. 1个月内：梳理自身学术优势与兴趣方向，锁定目标院校与专业，明确申请要求\n2. 3个月内：完成国际课程适配，确定竞赛与背景提升方向，制定详细学习计划\n3. 高中全程：每学期做1次自我复盘，调整学习节奏，确保始终朝着目标前进\n#### 五、成长提示\n1. 避免陷入“内卷焦虑”：顶级名校申请竞争激烈，勿因暂时的成绩波动或他人进度焦虑，按自己的节奏稳步推进即可\n2. 保留成长弹性：除学术提升外，保留个人兴趣爱好，打造完整个人特质，名校更青睐有温度、有独立思考能力的申请者`
            },
            correction: {
                parent: `#### 一、群体核心定位匹配\n您的家庭与孩子匹配「纠偏型」群体画像：孩子具备中等学术基础，家庭有充足教育预算，孩子在当前国内体系下存在明显环境错位，导致学习状态不佳，转轨核心诉求是通过赛道转换，帮孩子重建学习自信与学术体系。\n#### 二、核心痛点与优势\n1. 核心痛点：当前国内体系的环境与孩子的学习模式、性格特质不匹配，导致孩子学习潜力无法发挥，出现学业下滑、自信不足等问题\n2. 核心优势：孩子具备中等学术基础，有充足提升空间；家庭预算充足，可支撑转轨后的托管与学术提升；孩子有更换赛道的意愿，是转轨成功的核心前提\n#### 三、转轨核心规划建议（赛道转换，重建自信与学术体系）\n1. 环境优先适配：优先选择氛围更宽松、更注重个性化培养的国际学校/课程体系，从根源解决环境错位问题，让孩子在适配环境中重建学习安全感\n2. 托管式学术重建：选择具备成熟托管体系的机构/学校，通过1-1.5年的密集托管，帮孩子补全国际课程基础知识点，纠正不良学习习惯，重建完整学术体系，避免知识点断层\n3. 小目标积累自信：放弃“一步到位”的升学目标，为孩子制定阶段性小目标，比如本学期完成某门课程基础夯实、下次考试提升1个分数段，通过不断达成小目标，重建孩子学习自信\n#### 四、落地行动方案\n1. 1个月内：完成国际学校/课程体系调研，筛选氛围适配、托管体系成熟的目标院校，完成实地探访与面谈\n2. 3个月内：完成转轨前的基础衔接，对接托管资源，制定个性化学术提升计划，帮孩子提前适配国际课程学习模式\n3. 转轨后1-2年：全程跟进孩子学习状态，每月做1次复盘，调整托管与学习计划，确保孩子稳步提升\n#### 五、风险提示\n1. 避免急功近利：转轨后的学术重建需要时间，勿因孩子短期内成绩无明显提升就否定转轨选择，给孩子足够的适应时间\n2. 避免重复环境错位：勿只看学校排名，重点考察学校氛围、教学模式是否适配孩子性格与学习模式，避免从一个不合适的赛道换到另一个不合适的赛道\n3. 勿过度依赖托管：托管是帮孩子重建体系的工具，最终要帮孩子养成自主学习习惯，避免长期依赖托管，失去自主学习能力`,
                student: `#### 一、群体核心定位匹配\n你匹配「纠偏型」群体画像：具备中等学术基础，但在当前学习环境中感到明显不适，学习压力大、自信不足，家庭支持你更换学习赛道，转轨核心目标是通过环境转换，找到更适合自己的学习模式，重建学习自信与学术能力。\n#### 二、核心痛点与优势\n1. 核心痛点：当前学习环境与你的学习模式、性格特质不匹配，导致你无法发挥学习潜力，甚至出现学业抵触、自信不足的情况\n2. 核心优势：你有更换赛道、改变现状的意愿，这是转轨成功的核心动力；具备中等学术基础，有充足提升空间；家庭愿意提供充足支持，帮你适配新环境\n#### 三、转轨核心成长建议（赛道转换，重建自信与学术体系）\n1. 主动适配新环境：转轨到新学习环境后，主动融入新氛围，多和老师、同学沟通，积极参与课堂活动，快速建立新社交圈，从根源解决环境不适问题\n2. 拥抱托管式提升：不要抵触托管学习，托管是帮你快速补全基础、重建学习体系的工具，跟着老师的节奏，一步步补全知识点，纠正不良学习习惯，慢慢找到学习节奏\n3. 用小目标积累自信：勿给自己定过高目标，从“完成今天的学习任务”“这次考试比上次多5分”这样的小目标开始，每达成一个目标就给自己正向反馈，慢慢重建学习自信\n#### 四、落地行动方案\n1. 1个月内：和家长一起调研目标院校，说出自己对学习环境、教学模式的诉求，筛选出自己真正愿意去的学校\n2. 3个月内：完成转轨前的衔接学习，提前了解国际课程内容，适配全英教学环境，制定自己的阶段性小目标\n3. 转轨后1-2年：每月做1次自我复盘，查看目标完成情况，调整学习节奏，有问题及时和老师、家长沟通\n#### 五、成长提示\n1. 不要害怕重新开始：转轨不是对你过去的否定，而是给你一个重新选择的机会，放下过去的学业压力，在新环境里重新出发\n2. 不要急于求成：学习状态的恢复、学术能力的提升都需要时间，勿因短期内无明显进步就焦虑，稳步推进即可\n3. 主动表达需求：在新环境里，遇到学习、生活上的问题，一定要主动和老师、家长沟通，不要自己憋着，及时解决问题才能更快适应`
            },
            observation: {
                parent: `#### 一、群体核心定位匹配\n您的家庭与孩子匹配「观望型」群体画像：孩子学术基础处于中低水平，家庭教育预算有限，孩子自身学习动力不足、学习习惯较差，您对转轨持观望态度，核心诉求是明确转轨的风险与前提条件。\n#### 二、核心风险与前提\n1. 核心风险：孩子当前的学习习惯、动力问题，在国内体系下会被排名压力、老师监督一定程度约束，转轨到更注重自主学习的国际体系后，没有了强约束，孩子的问题会被无限放大，出现学业崩盘、完全无法跟上进度的情况\n2. 核心前提：转轨的唯一可行前提，是先通过托管补足孩子的学习习惯、提升学习动力、夯实学术基础，否则转轨只会是“灾难式”选择\n#### 三、转轨核心风险提示与规划建议（风险提示，转轨前必须补足习惯）\n1. 先补基础，再谈转轨：当前阶段不要做转轨决策，先拿出6个月-1年的时间，通过托管式学习，帮孩子补足学习习惯，提升学习动力，夯实学术基础，让孩子具备基本的自主学习能力，这是转轨的唯一前提\n2. 明确转轨核心诉求：不要因为“别人都转轨”就盲目跟风，先明确您和孩子转轨的核心诉求，是想减负？还是想换赛道升学？如果孩子本身没有学习动力，任何赛道都无法让孩子自动变好\n3. 预算与预期匹配：家庭预算有限，转轨前要明确，转轨后的投入不仅是学费，还有托管、背景提升等额外费用，要确保预算能覆盖全流程，避免中途出现资金断裂\n#### 四、落地行动方案\n1. 3个月内：放弃转轨想法，先聚焦孩子学习习惯养成，对接托管资源，制定个性化习惯养成计划，每天监督孩子完成学习任务，培养基本自律能力\n2. 6个月-1年后：如果孩子的学习习惯、动力有明显提升，学术基础也夯实了，再重新评估转轨可行性，筛选适配的低预算国际课程体系\n3. 全程：勿给孩子过高预期，先让孩子养成“按时完成作业、主动预习复习”的基本学习习惯，这是所有升学规划的基础\n#### 五、风险提示\n1. 绝对不要盲目转轨：在孩子没有补足学习习惯、提升学习动力之前，绝对不要转轨，否则只会让孩子的学业问题更严重，甚至出现厌学、辍学的情况\n2. 不要把转轨当成“万能解药”：转轨不是解决孩子所有学习问题的解药，孩子的学习问题根源在习惯和动力，不解决根源问题，换任何赛道都没用\n3. 避免预算透支：如果家庭预算有限，不要为了转轨透支家庭生活质量，先在国内体系下帮孩子补足基础，再考虑性价比更高的升学路径`,
                student: `#### 一、群体核心定位匹配\n你匹配「观望型」群体画像：学术基础处于中低水平，学习动力不足，学习习惯不佳，家庭教育预算有限，你对转轨也持观望态度，核心诉求是明确转轨对自己到底意味着什么。\n#### 二、核心风险与前提\n1. 核心风险：你可能觉得转轨到国际体系，学习压力会更小、更轻松，但实际上，国际体系对自主学习能力的要求更高，如果你没有良好的学习习惯和足够的学习动力，转轨后只会更跟不上进度，甚至出现学业崩盘，比在国内体系的情况更差\n2. 核心前提：转轨能给你带来好结果的唯一前提，是你先愿意改变自己的学习习惯，提升学习动力，夯实学术基础，具备基本的自主学习能力，否则转轨对你来说只会是一场灾难\n#### 三、转轨核心成长建议（风险提示，先补足习惯再谈转轨）\n1. 先改变自己，再选择赛道：当前阶段，不要纠结要不要转轨，先聚焦于改变自己的学习习惯，培养学习动力，先做到“按时完成作业、主动预习复习、不拖延”这些基本要求，这是你未来不管走什么赛道都需要的核心能力\n2. 明确自己到底想要什么：不要因为别人说转轨好就想转轨，先问自己，你转轨是为了什么？是想真的学到东西，还是想逃避现在的学习压力？如果是想逃避，那转轨只会让你更逃避，没有任何意义\n3. 做好吃苦的准备：不管是在国内体系，还是转轨到国际体系，学习都不是一件轻松的事，都需要你付出时间和精力，如果你没有做好吃苦的准备，任何赛道都无法让你拿到好的升学结果\n#### 四、落地行动方案\n1. 3个月内：放下转轨的想法，先从每天的学习任务开始，给自己制定小的学习目标，比如今天完成所有作业、明天预习明天的课程，慢慢养成良好的学习习惯\n2. 6个月-1年后：如果你发现自己的学习习惯变好了，也有了学习动力，再和家长一起评估转轨可行性，看看是否适合自己\n3. 全程：不要给自己找借口，学习是自己的事，只有你自己愿意改变，才能真正拿到好的结果\n#### 五、成长提示\n1. 不要把转轨当成“逃避的借口”：如果你只是想逃避现在的学习压力，转轨只会让你从一个压力场换到另一个压力场，甚至压力更大，因为国际体系的升学竞争也很激烈\n2. 成长比赛道更重要：不管你走什么赛道，养成良好的学习习惯、具备自主学习能力，都是你未来人生中最重要的东西，比一时的升学结果更重要\n3. 不要盲目跟风：别人的转轨成功，不代表你也能成功，每个人的情况都不一样，一定要结合自己的实际情况做决策，不要盲目跟风`

            potentialStock: {

            if (isTopAcademic && isLowBudget) return 'deep';
            if (isTopAcademic && !isLowBudget) return 'potential';
            if (isMidAcademic && !isLowBudget && isEnvironmentMismatch) return 'correction';
            if (!isTopAcademic && isLowMotivation) return 'observation';
            return 'potentialStock';
        }

        function setRole(r) { state.role = r; state.step = 1; state.answers = []; render(); }
        function next(val) { state.answers.push(val); state.step++; render(); }

        function showFinal() {
            const type = state.role === 'parent' ? getParentType(state.answers) : getStudentType(state.answers);
            const reportObj = REPORTS[type][state.role];
            document.getElementById('quiz-content').innerHTML = `
                <div class="report-content">
                    <h2 class="text-2xl font-bold text-slate-800 mb-6 border-b pb-4">评估结论</h2>
                    <div class="space-y-4">${reportObj.split('\n').map(l => l.startsWith('####') ? `<h4>${l.replace('#### ', '')}</h4>` : `<p>${l}</p>`).join('')}</div>
                    
                    <div class="mt-10 p-6 border-2 border-blue-500 rounded-xl bg-blue-50">
                        <p class="text-blue-800 text-sm leading-relaxed">
                            <strong>免责声明：</strong>本测评结果基于您提供的主观信息，仅供参考，不作为最终决策依据。如需获取详细的厦门本地国际学校资料及各校招生门槛分析，建议您找作者获取资料进行调研，以便做出最稳健的规划。欢迎添加联系方式，获取厦门本地国际学校招生简章和避坑指南：
                        </p>
                        <p class="font-bold text-blue-900 mt-3 text-lg">XHS & WX: AL_Sssiyi</p>
                    </div>

                    <button onclick="location.reload()" class="w-full py-4 mt-6 bg-slate-800 text-white rounded-xl font-medium hover:bg-black transition">重新评估</button>
                </div>`;
        }

        function render() {
            const content = document.getElementById('quiz-content');
            if (state.step === 0) {
                content.innerHTML = `<button onclick="setRole('parent')" class="w-full py-4 mb-4 border border-blue-600 text-blue-600 rounded-xl hover:bg-blue-600 hover:text-white transition">我是家长，进行家庭决策评估</button>
                    <button onclick="setRole('student')" class="w-full py-4 border border-blue-600 text-blue-600 rounded-xl hover:bg-blue-600 hover:text-white transition">我是学生，进行个人潜能自测</button>`;
                return;
            }
            const questions = state.role === 'parent' ? parentQuestions : studentQuestions;
            const q = questions[state.step - 1];
            if (!q) return showFinal();
            document.getElementById('progress-text').innerText = `进度：第 ${state.step} 题 / 共 15 题`;
            content.innerHTML = `<h2 class="text-lg font-medium mb-6 text-slate-800">${q.title}</h2>
                <div class="space-y-3">
                ${q.opts.map(o => `<button onclick="next('${o}')" class="w-full text-left p-4 bg-slate-50 border border-slate-200 rounded-lg hover:border-blue-600 transition">${o}</button>`).join('')}
                </div>`;
        }
        render();
    </script>
</body>
</html>
